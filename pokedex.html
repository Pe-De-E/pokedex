<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mein Pokédex</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <nav>
      <a href="index.html">Homepage</a>
      <a href="pokedex.html">Pokédex</a>
    </nav>
    <main>
      <div
        class="min-h-screen bg-yellow-100 flex items-center justify-center p-6"
      >
        <div
          class="w-full max-w-md bg-yellow-400 rounded-3xl shadow-2xl p-6 border-4 border-yellow-600"
        >
          <div
            class="bg-indigo-950 rounded-2xl p-4 shadow-inner border-4 border-indigo-900"
          >
            <div
              id="pokemon-list"
              class="bg-lime-200 rounded-xl h-[400px] p-4 grid grid-cols-2 gap-4 overflow-y-auto border-4 border-lime-900"
            ></div>
          </div>

          <div class="mt-6 flex justify-between items-center">
            <div class="relative w-24 h-24">
              <div
                class="absolute left-8 top-0 w-8 h-24 bg-indigo-950 rounded"
              ></div>
              <div
                class="absolute left-0 top-8 w-24 h-8 bg-indigo-950 rounded"
              ></div>
              <div class="absolute left-8 top-8 w-8 h-8 bg-indigo-800"></div>
            </div>

            <div class="flex gap-4 rotate-[-20deg]">
              <button
                class="w-12 h-12 bg-gray-700 rounded-full shadow-lg active:scale-95 border-2 border-gray-400"
              ></button>

              <button
                class="w-12 h-12 bg-gray-700 rounded-full shadow-lg active:scale-95 border-2 border-gray-400"
              ></button>
            </div>
          </div>

          <div class="mt-6 flex justify-center gap-6">
            <div class="flex flex-col items-center gap-1">
              <button
                class="w-16 h-4 bg-indigo-900 rounded-full shadow active:scale-95"
              ></button>
            </div>

            <div class="flex flex-col items-center gap-1">
              <button
                class="w-16 h-4 bg-indigo-900 rounded-full shadow active:scale-95"
              ></button>
            </div>
          </div>

          <div class="mt-6 flex justify-end gap-1 pr-4 rotate-[-12deg]">
            <div class="w-1 h-8 bg-yellow-700 rounded"></div>
            <div class="w-1 h-8 bg-yellow-700 rounded"></div>
            <div class="w-1 h-8 bg-yellow-700 rounded"></div>
            <div class="w-1 h-8 bg-yellow-700 rounded"></div>
            <div class="w-1 h-8 bg-yellow-700 rounded"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="pokedex.js"></script>
  </body>
</html>
