<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PokéSearch</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <main>

      <div class="min-h-screen bg-yellow-100 flex items-center justify-center p-6">
        
        <div class="w-full max-w-md bg-yellow-400 rounded-3xl shadow-2xl p-6 border-4 border-yellow-600">
          
          <div class="bg-indigo-950 rounded-2xl p-4 shadow-inner border-4 border-indigo-900">
            <form id="search-form" class="mb-4 flex gap-2">
              <input
                type="text"
                id="search-input"
                placeholder="Name or ID..."
                class="w-full p-2 text-sm rounded bg-white border"
              />
              <button
                type="submit"
                class="bg-gray-800 text-white px-3 py-2 text-xs rounded"
              >
             
              </button>
            </form>

            <dialog id="search-dialog" class="p-4 rounded">
              <div id="dialog-content"></div>
              <button id="dialog-close" class="mt-2 bg-black text-white px-3 py-1 text-xs rounded">
             
              </button>
            </dialog>

            <div
              id="pokemon-list"
              class="bg-gray-300 rounded-md h-[400px] p-4 grid grid-cols-2 gap-3 overflow-y-auto border-4 border-gray-900"
            ></div>

          </div>

          <div class="mt-6 flex justify-center gap-8">
            
            <div class="flex flex-col items-center gap-2">
              <a
                href="index.html"
                class="w-16 h-4 bg-indigo-900 rounded-full shadow active:scale-95 hover:bg-indigo-700"
              ></a>
              <span class="text-xs font-bold text-indigo-950">PokéSearch</span>
            </div>

            <div class="flex flex-col items-center gap-2">
              <a
                href="pokedex.html"
                class="w-16 h-4 bg-indigo-900 rounded-full shadow active:scale-95 hover:bg-indigo-700"
              ></a>
              <span class="text-xs font-bold text-indigo-950">Pokédex</span>
            </div>

          </div>

        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
